<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sparkie — Moonlight Pagoda</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #020a10; font-family: 'Georgia', serif; }
    canvas { display: block; }
    #hint { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); color: rgba(200,200,220,0.4); font-size: 12px; letter-spacing: 0.08em; pointer-events: none; opacity: 1; transition: opacity 2s ease; }
    #title { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); color: rgba(180,180,200,0.4); font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; }
  </style>
</head>
<body>
<div id="title">🏯 MOONLIGHT PAGODA 🌙</div>
<div id="hint">drag to orbit</div>
<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.0;
document.body.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x020a10);
scene.fog = new THREE.FogExp2(0x020a10, 0.015);

const camera = new THREE.PerspectiveCamera(60, innerWidth / innerHeight, 0.1, 500);
camera.position.set(0, 15, 40);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.autoRotate = true;
controls.autoRotateSpeed = 0.08;
controls.maxPolarAngle = Math.PI * 0.6;
controls.minDistance = 8;
controls.maxDistance = 70;

scene.add(new THREE.AmbientLight(0x0a1020, 0.3));

const woodMat = new THREE.MeshStandardMaterial({ color: 0x8a2020, roughness: 0.8 });
const stoneMat = new THREE.MeshStandardMaterial({ color: 0x2a2520, roughness: 0.9 });
const goldMat = new THREE.MeshStandardMaterial({ color: 0xffcc33, metalness: 0.8 });

// Stone platform
const platform = new THREE.Mesh(
  new THREE.CylinderGeometry(12, 14, 2, 8),
  stoneMat
);
platform.position.y = 1;
scene.add(platform);

// Main pagoda structure
const base = new THREE.Mesh(new THREE.CylinderGeometry(8, 10, 4, 8), woodMat);
base.position.y = 4;
scene.add(base);

// First floor
const floor1 = new THREE.Mesh(new THREE.CylinderGeometry(9, 9, 0.5, 8), stoneMat);
floor1.position.y = 6;
scene.add(floor1);

// Second level
const level2 = new THREE.Mesh(new THREE.CylinderGeometry(6, 7, 3, 8), woodMat);
level2.position.y = 8;
scene.add(level2);

const floor2 = new THREE.Mesh(new THREE.CylinderGeometry(7, 7, 0.4, 8), stoneMat);
floor2.position.y = 10;
scene.add(floor2);

// Third level
const level3 = new THREE.Mesh(new THREE.CylinderGeometry(4, 5, 2.5, 8), woodMat);
level3.position.y = 11.5;
scene.add(level3);

const floor3 = new THREE.Mesh(new THREE.CylinderGeometry(5, 5, 0.3, 8), stoneMat);
floor3.position.y = 13;
scene.add(floor3);

// Top level
const topLevel = new THREE.Mesh(new THREE.CylinderGeometry(2.5, 3, 2, 8), woodMat);
topLevel.position.y = 14.5;
scene.add(topLevel);

// Pagoda spire
const spire = new THREE.Mesh(new THREE.ConeGeometry(1, 5, 8), goldMat);
spire.position.y = 18;
scene.add(spire);

// Golden finial
const finial = new THREE.Mesh(
  new THREE.SphereGeometry(0.5, 12, 12),
  goldMat
);
finial.position.y = 20.5;
scene.add(finial);

// Curved eaves at each level
for (let level = 0; level < 4; level++) {
  const y = 3 + level * 3.2;
  const radius = 10 - level * 2;
  const eaveCount = 8;
  
  for (let e = 0; e < eaveCount; e++) {
    const angle = (e / eaveCount) * Math.PI * 2;
    
    const eave = new THREE.Mesh(
      new THREE.BoxGeometry(2, 0.2, radius * 0.4),
      woodMat
    );
    eave.position.set(
      Math.cos(angle) * radius * 0.7,
      y,
      Math.sin(angle) * radius * 0.7
    );
    eave.rotation.y = -angle;
    scene.add(eave);
  }
  
  // Corner bells
  for (let c = 0; c < 4; c++) {
    const cAngle = (c / 4) * Math.PI * 2;
    const bell = new THREE.Mesh(
      new THREE.SphereGeometry(0.2, 8, 8),
      goldMat
    );
    bell.scale.y = 1.5;
    bell.position.set(
      Math.cos(cAngle) * (radius + 0.5),
      y - 0.5,
      Math.sin(cAngle) * (radius + 0.5)
    );
    scene.add(bell);
  }
}

// Lanterns
for (let l = 0; l < 16; l++) {
  const angle = (l / 16) * Math.PI * 2;
  const r = 8.5;
  
  const pole = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.08, 2, 6),
    woodMat
  );
  pole.position.set(Math.cos(angle) * r, 5, Math.sin(angle) * r);
  scene.add(pole);
  
  const lantern = new THREE.Mesh(
    new THREE.SphereGeometry(0.4, 8, 8),
    new THREE.MeshStandardMaterial({ color: 0xff6622, emissive: 0xff4400, emissiveIntensity: 2.5 })
  );
  lantern.position.set(Math.cos(angle) * r, 6.5, Math.sin(angle) * r);
  scene.add(lantern);
  
  const lLight = new THREE.PointLight(0xff8833, 1.5, 8);
  lLight.position.set(Math.cos(angle) * r, 6.5, Math.sin(angle) * r);
  scene.add(lLight);
}

// Stone steps
for (let s = 0; s < 12; s++) {
  const step = new THREE.Mesh(
    new THREE.BoxGeometry(6, 0.3, 1),
    stoneMat
  );
  step.position.set(0, s * 0.3, 15 + s * 0.8);
  scene.add(step);
}

// Cherry blossom trees
for (let t = 0; t < 5; t++) {
  const angle = (t / 5) * Math.PI * 2;
  const r = 20 + Math.random() * 5;
  const tx = Math.cos(angle) * r;
  const tz = Math.sin(angle) * r;
  
  const trunk = new THREE.Mesh(
    new THREE.CylinderGeometry(0.3, 0.5, 6, 8),
    new THREE.MeshStandardMaterial({ color: 0x3a1515 })
  );
  trunk.position.set(tx, 3, tz);
  trunk.rotation.z = (Math.random() - 0.5) * 0.2;
  scene.add(trunk);
  
  // Blossom cloud
  const blossomMat = new THREE.ShaderMaterial({
    uniforms: {},
    vertexShader: `varying vec3 vPos; void main() { vPos = position; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec3 vPos;
      void main() {
        float d = length(vPos) * 0.3;
        vec3 col = mix(vec3(1.0, 0.7, 0.8), vec3(0.9, 0.5, 0.6), d);
        gl_FragColor = vec4(col, 0.8);
      }
    `,
    transparent: true, depthWrite: false
  });
  
  const blossom = new THREE.Mesh(
    new THREE.SphereGeometry(3 + Math.random() * 2, 12, 12),
    blossomMat
  );
  blossom.position.set(tx, 7 + Math.random(), tz);
  scene.add(blossom);
}

// Koi pond
const pond = new THREE.Mesh(
  new THREE.CircleGeometry(8, 24),
  new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `varying vec2 vUv; void main() { vUv = uv; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
    fragmentShader: `
      varying vec2 vUv;
      uniform float uTime;
      void main() {
        float ripple = sin(length(vUv - 0.5) * 20.0 - uTime * 2.0) * 0.05;
        vec3 col = mix(vec3(0.02, 0.15, 0.3), vec3(0.05, 0.25, 0.4), ripple + 0.5);
        gl_FragColor = vec4(col, 0.9);
      }
    `
  })
);
pond.rotation.x = -Math.PI / 2;
pond.position.set(-18, 0.1, 15);
pond.userData.isPond = true;
scene.add(pond);

// Koi fish
const koiColors = [0xff4422, 0xffcc22, 0xffffff];
for (let k = 0; k < 8; k++) {
  const koi = new THREE.Mesh(
    new THREE.SphereGeometry(0.2, 8, 8),
    new THREE.MeshStandardMaterial({ 
      color: koiColors[Math.floor(Math.random() * 3)], 
      emissive: koiColors[Math.floor(Math.random() * 3)],
      emissiveIntensity: 0.3 
    })
  );
  koi.scale.set(1, 0.5, 2);
  koi.position.set(
    -18 + (Math.random() - 0.5) * 12,
    0.4,
    15 + (Math.random() - 0.5) * 12
  );
  koi.userData.koiPhase = Math.random() * Math.PI * 2;
  koi.userData.isKoi = true;
  scene.add(koi);
}

// Moon
const moon = new THREE.Mesh(
  new THREE.SphereGeometry(12, 24, 24),
  new THREE.MeshStandardMaterial({ color: 0xe8e8d0, emissive: 0xaaa888, emissiveIntensity: 0.4 })
);
moon.position.set(30, 50, -80);
scene.add(moon);

// Moonlight cone
const moonLight = new THREE.DirectionalLight(0xd0d8e0, 0.8);
moonLight.position.set(30, 50, -80);
scene.add(moonLight);

// Stars
const starCount = 1200;
const starPos = new Float32Array(starCount * 3);
for (let i = 0; i < starCount; i++) {
  const theta = Math.random() * Math.PI * 2;
  const r = 150 + Math.random() * 50;
  starPos[i*3] = Math.cos(theta) * r;
  starPos[i*3+1] = 20 + Math.random() * 70;
  starPos[i*3+2] = Math.sin(theta) * r;
}
const starGeo = new THREE.BufferGeometry();
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({ color: 0xffffff, size: 0.4 })));

// Firefly particles
const ffCount = 100;
const ffPos = new Float32Array(ffCount * 3);
for (let i = 0; i < ffCount; i++) {
  ffPos[i*3] = (Math.random() - 0.5) * 50;
  ffPos[i*3+1] = 2 + Math.random() * 15;
  ffPos[i*3+2] = (Math.random() - 0.5) * 50;
}
const ffGeo = new THREE.BufferGeometry();
ffGeo.setAttribute('position', new THREE.BufferAttribute(ffPos, 3));
const ffMat = new THREE.ShaderMaterial({
  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    uniform float uTime;
    void main() {
      vec3 p = position;
      p.x += sin(uTime * 0.5 + position.z * 0.1) * 0.6;
      p.y += cos(uTime * 0.3 + position.x * 0.1) * 0.4;
      gl_PointSize = 10.0;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(p, 1.0);
    }
  `,
  fragmentShader: `
    void main() {
      float d = length(gl_PointCoord - 0.5);
      if (d > 0.5) discard;
      float a = 1.0 - d * 2.0;
      vec3 col = vec3(0.9, 0.95, 0.5);
      gl_FragColor = vec4(col, a * 0.8);
    }
  `,
  transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
});
const fireflies = new THREE.Points(ffGeo, ffMat);
fireflies.userData.isFireflies = true;
scene.add(fireflies);

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  
  if (pond.userData.isPond && pond.material.uniforms.uTime) pond.material.uniforms.uTime.value = t;
  if (fireflies.userData.isFireflies) fireflies.material.uniforms.uTime.value = t;
  
  // Animate koi
  scene.children.forEach(child => {
    if (child.userData.isKoi) {
      const phase = child.userData.koiPhase;
      child.position.x += Math.sin(t * 0.5 + phase) * 0.01;
      child.position.z += Math.cos(t * 0.5 + phase) * 0.01;
    }
  });
  
  controls.update();
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
setTimeout(() => { document.getElementById('hint').style.opacity = '0'; }, 5000);
</script>
</body>
</html>
